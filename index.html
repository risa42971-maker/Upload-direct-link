<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>រាប់ថយក្រោយ - ១០ សីហា | Owner: TH3Cen_cee</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <div class="countdown-card">
            <h1>📚 កាលមើលមេរៀន</h1>
            <p class="target-date" id="targetDateDisplay">កំពុងផ្ទុក...</p>
            
            <div class="countdown-grid">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">ថ្ងៃ</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">ម៉ោង</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">នាទី</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">វិនាទី</span>
                </div>
            </div>
            
            <div class="message" id="message">កំពុងរាប់ទៅកាន់ថ្ងៃ ១០ សីហា...</div>
            <div class="note">🎯 គោលដៅ: ថ្ងៃទី 10 ខែសីហា</div>
        </div>
        
        <!-- Owner Section -->
        <div class="owner-card">
            <div class="owner-label">👑 Owner</div>
            <div class="owner-links">
                <a href="https://www.facebook.com/share/1E7byZnsts/" target="_blank" rel="noopener noreferrer" class="social-link facebook">
                    📘 Facebook : TH3Cen_cee
                </a>
                <a href="https://t.me/TH3Cen_cee" target="_blank" rel="noopener noreferrer" class="social-link telegram">
                    💬 Telegram : @TH3Cen_cee
                </a>
            </div>
            <div class="owner-motto">Never Give Up 🔥</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
