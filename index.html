<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NebulaUpload · Direct Links + QR Codes</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="upload-app">
    <!-- Header -->
    <div class="app-header">
        <div class="title-row">
            <div class="logo">
                <i class="fas fa-cloud-moon"></i>
                <h1>NebulaLink</h1>
            </div>
            <div class="user-chip" id="userIdBadge">
                <i class="fas fa-id-card"></i> <span id="globalUserId">—</span>
            </div>
        </div>
        <div class="subhead">
            <span><i class="fas fa-image"></i> Images → Direct + QR</span>
            <span><i class="fas fa-file-video"></i> Video / Doc / MP3 → Direct link</span>
            <span><i class="fas fa-database"></i> Catbox.moe cloud</span>
        </div>
    </div>

    <!-- Body Content -->
    <div class="app-body">
        <!-- Upload Zone -->
        <div class="dropzone" id="dropzoneEl">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Upload file</h3>
            <p>Click or drag & drop (max 200MB) · Images, videos, documents, audio</p>
            <div id="previewFileName" class="file-badge" style="display: none;"></div>
        </div>
        <input type="file" id="fileInput" accept="*/*">

        <!-- Progress Area -->
        <div class="progress-area" id="progressArea">
            <div class="progress-track">
                <div class="progress-fill-dynamic" id="uploadProgressFill"></div>
            </div>
            <div class="status-text" id="statusMessage">
                <i class="fas fa-hourglass-half"></i> Ready
            </div>
        </div>

        <!-- Results Panel -->
        <div id="dynamicResults"></div>

        <!-- Owner / Contact Section -->
        <div class="owner-section" id="ownerSection">
            <div class="owner-card">
                <div class="owner-title">
                    <i class="fas fa-crown"></i> 
                    <span>👑 Owner</span>
                    <i class="fas fa-crown"></i>
                </div>
                <div class="owner-links">
                    <a href="https://www.facebook.com/share/1E7byZnsts/" target="_blank" class="owner-link facebook-link">
                        <i class="fab fa-facebook-f"></i>
                        <span>Facebook</span>
                    </a>
                    <a href="https://t.me/TH3Cen_cee" target="_blank" class="owner-link telegram-link">
                        <i class="fab fa-telegram-plane"></i>
                        <span>Telegram</span>
                    </a>
                </div>
                <div class="owner-note">
                    <i class="fas fa-headset"></i> Contact owner for support or inquiries
                </div>
            </div>
        </div>

        <footer>
            <i class="fas fa-lock"></i> encrypted upload · direct links from Catbox · QR for images
            <div style="margin-top: 8px;">
                <button class="reset-btn" id="clearResultsBtn"><i class="fas fa-trash-alt"></i> Clear results</button>
            </div>
        </footer>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
