<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>រាប់ថយក្រោយ - ថ្ងៃទី 10 សីហា</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="countdown-card">
            <h1>នៅសល់ពេលវេលា</h1>
            <p class="target-date" id="targetDateDisplay">កំពុងផ្ទុក...</p>
            
            <div class="countdown-grid">
                <div class="time-box">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">ថ្ងៃ</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">ម៉ោង</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">នាទី</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">វិនាទី</span>
                </div>
            </div>
            
            <div class="message" id="message"></div>
            <div class="note">គោលដៅ: ថ្ងៃទី 10 ខែសីហា (ឆ្នាំនេះ ឬឆ្នាំក្រោយ)</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
